# Machine specifications. K (max nesting depth) = 3.

# ---------------------------------------------------------------------------
# Layer 1: shape tracker (anchored; generalizes arithmetic's depth_tracker)
# ---------------------------------------------------------------------------
- layer: shape
  machines:
    - name: shape_tracker
      anchored: true
      # States are container-type stacks sigma over {O, A}, |sigma| <= 3
      # (15 states), plus overflow. Depth d = |sigma|. Conventions match
      # arithmetic: bracket tokens carry the INNER depth they open/close.
      transitions_schema: |
        from sigma, on LBRACE   (d<3): push O; emit DEPTH:{d+1}, GROUP_START:{d+1}
        from sigma, on LBRACKET (d<3): push A; emit DEPTH:{d+1}, GROUP_START:{d+1}
        from sigma, on open at d=3: -> overflow; emit ERROR:DEPTH_EXCEEDED
        from sigma (top=O), on RBRACE:   pop; emit DEPTH:{d}, GROUP_END:{d},
                                         and ENCL:{new_top}:{d-1} if nonempty
        from sigma (top=A), on RBRACKET: pop; same emissions
        from sigma (top=O), on RBRACKET: pop anyway (error recovery);
                                         same emissions plus ERROR:MISMATCHED_CLOSE
        from sigma (top=A), on RBRACE:   symmetric
        from (),    on any closer: stay; emit ERROR:UNBALANCED_CLOSE
        from sigma, on non-bracket: stay; emit DEPTH:{d},
                                    and CTX:{top}:{d} if nonempty
        overflow: self-loop on any; emit DEPTH:OVERFLOW
      on_end:
        not_accepting: ["ERROR:UNBALANCED_OPEN"]   # runner-level check
      notes: >
        CTX marks every interior token with its innermost container;
        ENCL marks every closing bracket with the container around the
        one it closes. ENCL is what lets a finished container complete
        as a value in its parent with a single-token emitter.

# ---------------------------------------------------------------------------
# Layer 2: instruction emitters
# ---------------------------------------------------------------------------
- layer: emit
  machines:
    - name: new_obj   # depth-independent
      pattern: "<LBRACE>"
      emit: [{ label: "EXEC.0:NEW_OBJ", anchor: firing token }]
    - name: new_arr
      pattern: "<LBRACKET>"
      emit: [{ label: "EXEC.0:NEW_ARR", anchor: firing token }]
    - name: push      # every scalar pushes itself; keys included --
                      # the pending key lives on the VM stack under its value
      pattern: "<SCALAR>"
      emit: [{ label: "EXEC.0:PUSH(!{VAL})", anchor: firing token }]
  schema: forall d in 1..3
  machines_per_depth:
    - name: append_scalar@{d}
      pattern: "<SCALAR & CTX:ARR:{d}>"
      emit: [{ label: "EXEC.1:APPEND", anchor: firing token }]
    - name: append_container@{d}     # d <= 2: a container inside an array
      pattern: "<GROUP_END:{d+1} & ENCL:ARR:{d}>"
      emit: [{ label: "EXEC.1:APPEND", anchor: firing token }]
    - name: setk_scalar@{d}
      # the COLON prefix is what distinguishes a value string from a key
      pattern: "<COLON & CTX:OBJ:{d}> <SCALAR & CTX:OBJ:{d}>"
      emit: [{ label: "EXEC.1:SETK", anchor: the scalar token }]
    - name: setk_container@{d}       # d <= 2; containers are never keys,
                                     # so no COLON context is needed
      pattern: "<GROUP_END:{d+1} & ENCL:OBJ:{d}>"
      emit: [{ label: "EXEC.1:SETK", anchor: firing token }]

# Rank discipline: rank 0 (NEW_*/PUSH) before rank 1 (APPEND/SETK) on the
# same token. At most one rank-1 op can land on any token (a closing
# bracket has exactly one ENCL; a scalar has exactly one CTX), so no
# further tie-breaking is needed.
