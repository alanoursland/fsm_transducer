# Tier-1 lexicon: all 288 words of the McGuffey Primer sentences, plus
# the primer seed vocabulary (growth never removes words).
#
# PROVENANCE: tagged by the LLM collaborator (LLM-as-annotator, first
# use — see notes on the oracle cliff). Treat as silver: spot-check.
# Ambiguous words carry weighted tags; the clause machine's forks and
# the NFA frontier handle the rest.
#
# Tag inventory:
#   N noun (NP head)        NAME proper noun (also N)
#   PRON pronoun (also N)   POSS possessive form (NP-internal)
#   V verb                  COP copula     MOD modal    AUX do-support
#   DET determiner          NUM number (NP-internal)
#   ADJ adjective           ADV adverb     NEG not
#   PREP preposition        TO infinitival to (also PREP)
#   CONJ conjunction        WH wh-word     INTERJ oh/yes/no

