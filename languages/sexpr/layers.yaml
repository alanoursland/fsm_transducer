# Machine specifications. K (max nesting depth) = 3.

# ---------------------------------------------------------------------------
# Layer 1: shape/role tracker (anchored)
# ---------------------------------------------------------------------------
- layer: shape
  machines:
    - name: shape_role_tracker
      anchored: true
      # States are stacks sigma over {F, R}, |sigma| <= 3, plus overflow.
      # F = this list's head position is still pending; R = in the body.
      # Depth d = |sigma|. Bracket tokens carry the INNER depth.
      transitions_schema: |
        from sigma, on LPAREN (d<3):
            emit DEPTH:{d+1}, GROUP_START:{d+1}
            if sigma nonempty: emit ROLE:{HEAD if top=F else ARG}:{d}
            new state: (sigma with top flipped to R) + (F,)
        from sigma, on LPAREN at d=3: -> overflow; emit ERROR:DEPTH_EXCEEDED
        from sigma (nonempty), on RPAREN:
            pop; emit DEPTH:{d}, GROUP_END:{d},
            and ENCL:LIST:{d-1} if still nonempty
        from (), on RPAREN: stay; emit ERROR:UNBALANCED_CLOSE
        from sigma, on ATOM:
            emit DEPTH:{d}
            if sigma nonempty:
                emit CTX:LIST:{d}, ROLE:{HEAD if top=F else ARG}:{d}
                new state: sigma with top flipped to R
        overflow: self-loop on any; emit DEPTH:OVERFLOW
      on_end:
        not_accepting: ["ERROR:UNBALANCED_OPEN"]   # runner-level check
      notes: >
        The F->R flip is the whole point of this language: the tracker
        carries one bit of *expectation* per open list, and ROLE labels
        are the first grammatical-relation family in the project. A
        sublist's role is emitted on its opening paren (the role
        belongs to the list-as-element, read at its first token).

# ---------------------------------------------------------------------------
# Layer 2: instruction emitters
# ---------------------------------------------------------------------------
- layer: emit
  machines:
    - name: new_list
      pattern: "<LPAREN>"
      emit: [{ label: "EXEC.0:NEW_LIST", anchor: firing token }]
    - name: push
      pattern: "<ATOM>"
      emit: [{ label: "EXEC.0:PUSH(!{VAL})", anchor: firing token }]
  schema: forall d in 1..3
  machines_per_depth:
    - name: append_atom@{d}
      pattern: "<ATOM & CTX:LIST:{d}>"
      emit: [{ label: "EXEC.1:APPEND", anchor: firing token }]
    - name: append_list@{d}        # d <= 2: a list inside a list
      pattern: "<GROUP_END:{d+1} & ENCL:LIST:{d}>"
      emit: [{ label: "EXEC.1:APPEND", anchor: firing token }]

# Single container type => HEAD/ARG distinction does not change the
# build instructions (everything APPENDs); roles are pure annotation,
# consumed by downstream layers (arity checking, evaluation) that this
# language deliberately does not include. Rank discipline as in JSON;
# collisions impossible for the same reasons.
